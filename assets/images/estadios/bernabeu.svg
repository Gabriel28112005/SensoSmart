<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="skyB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a2342"/>
      <stop offset="60%" stop-color="#1a3a5f"/>
      <stop offset="100%" stop-color="#2a5a8f"/>
    </linearGradient>
    <linearGradient id="metalB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8e8e8"/>
      <stop offset="50%" stop-color="#b8b8b8"/>
      <stop offset="100%" stop-color="#888"/>
    </linearGradient>
    <linearGradient id="fieldB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a8045"/>
      <stop offset="100%" stop-color="#1d5a2c"/>
    </linearGradient>
    <radialGradient id="lightB" cx="0.5" cy="0" r="1">
      <stop offset="0%" stop-color="#fff8c8" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#fff8c8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Cielo -->
  <rect width="800" height="400" fill="url(#skyB)"/>

  <!-- Estrellas/luces de fondo -->
  <g opacity="0.6">
    <circle cx="120" cy="40" r="1" fill="#fff"/>
    <circle cx="280" cy="60" r="1.5" fill="#fff"/>
    <circle cx="450" cy="30" r="1" fill="#fff"/>
    <circle cx="620" cy="50" r="1" fill="#fff"/>
    <circle cx="720" cy="80" r="1" fill="#fff"/>
  </g>

  <!-- Skyline de Madrid (siluetas) -->
  <g fill="#1a2a3f" opacity="0.7">
    <rect x="0" y="220" width="60" height="80"/>
    <rect x="55" y="180" width="40" height="120"/>
    <rect x="700" y="200" width="50" height="100"/>
    <rect x="745" y="230" width="55" height="70"/>
  </g>

  <!-- Estructura exterior del Bernabéu (forma curva característica nueva) -->
  <!-- Sombra base -->
  <ellipse cx="400" cy="370" rx="380" ry="20" fill="#000" opacity="0.4"/>

  <!-- Base del estadio -->
  <path d="M 80 360 L 80 280 Q 80 220 200 200 L 600 200 Q 720 220 720 280 L 720 360 Z"
        fill="url(#metalB)" stroke="#666" stroke-width="2"/>

  <!-- Líneas verticales del exoesqueleto característico -->
  <g stroke="#999" stroke-width="1.5" opacity="0.7" fill="none">
    <line x1="120" y1="210" x2="120" y2="360"/>
    <line x1="170" y1="205" x2="170" y2="360"/>
    <line x1="220" y1="202" x2="220" y2="360"/>
    <line x1="270" y1="200" x2="270" y2="360"/>
    <line x1="320" y1="200" x2="320" y2="360"/>
    <line x1="370" y1="200" x2="370" y2="360"/>
    <line x1="420" y1="200" x2="420" y2="360"/>
    <line x1="470" y1="200" x2="470" y2="360"/>
    <line x1="520" y1="200" x2="520" y2="360"/>
    <line x1="570" y1="202" x2="570" y2="360"/>
    <line x1="620" y1="205" x2="620" y2="360"/>
    <line x1="680" y1="215" x2="680" y2="360"/>
  </g>

  <!-- Líneas horizontales -->
  <g stroke="#999" stroke-width="1" opacity="0.5" fill="none">
    <path d="M 80 240 Q 200 210 400 205 Q 600 210 720 240"/>
    <path d="M 80 280 Q 200 250 400 245 Q 600 250 720 280"/>
    <path d="M 80 320 Q 200 290 400 285 Q 600 290 720 320"/>
  </g>

  <!-- Cubierta superior (techo retractil) -->
  <ellipse cx="400" cy="195" rx="320" ry="20" fill="#5a6a7a" stroke="#333" stroke-width="1.5"/>
  <ellipse cx="400" cy="195" rx="280" ry="14" fill="#1a2530" opacity="0.6"/>

  <!-- Centro del techo (logo zona) -->
  <ellipse cx="400" cy="195" rx="30" ry="6" fill="#333"/>

  <!-- Foco de luz nocturna -->
  <ellipse cx="400" cy="180" rx="240" ry="80" fill="url(#lightB)"/>

  <!-- Campo visible (vista parcial superior) -->
  <ellipse cx="400" cy="200" rx="100" ry="6" fill="url(#fieldB)" opacity="0.9"/>
  <line x1="400" y1="195" x2="400" y2="205" stroke="#fff" stroke-width="0.5" opacity="0.7"/>
  <ellipse cx="400" cy="200" rx="6" ry="1.5" fill="none" stroke="#fff" stroke-width="0.4" opacity="0.7"/>

  <!-- Luces alrededor del estadio (LED ring efecto) -->
  <g fill="#fff5b8" opacity="0.85">
    <circle cx="120" cy="240" r="1.5"/>
    <circle cx="170" cy="225" r="1.5"/>
    <circle cx="220" cy="218" r="1.5"/>
    <circle cx="270" cy="215" r="1.5"/>
    <circle cx="320" cy="213" r="1.5"/>
    <circle cx="370" cy="212" r="1.5"/>
    <circle cx="420" cy="212" r="1.5"/>
    <circle cx="470" cy="213" r="1.5"/>
    <circle cx="520" cy="215" r="1.5"/>
    <circle cx="570" cy="218" r="1.5"/>
    <circle cx="620" cy="225" r="1.5"/>
    <circle cx="680" cy="240" r="1.5"/>
  </g>

  <!-- Logo/texto -->
  <text x="400" y="335" text-anchor="middle" font-family="Arial Black, sans-serif"
        font-size="28" fill="#fff" font-weight="900" letter-spacing="3"
        opacity="0.3">BERNABÉU</text>

  <!-- Iluminación inferior (tira LED) -->
  <rect x="80" y="358" width="640" height="3" fill="#FFD700" opacity="0.7"/>

  <!-- Sello Smart Turf AI -->
  <g transform="translate(660,30)">
    <circle r="22" fill="#1B4332" stroke="#FFD700" stroke-width="1.5"/>
    <text y="-2" text-anchor="middle" font-family="Arial" font-size="7" fill="#FFD700" font-weight="700">SMART</text>
    <text y="6" text-anchor="middle" font-family="Arial" font-size="7" fill="#FFD700" font-weight="700">TURF AI</text>
    <text y="14" text-anchor="middle" font-family="Arial" font-size="5" fill="#52B788">ELITE</text>
  </g>

  <!-- Mejoras: marcador electrónico + detalles de campo -->
  <!-- Marcador electrónico (panel LED) -->
  <g transform="translate(40,80)">
    <rect x="0" y="0" width="140" height="48" rx="4" fill="#0a0a0a" stroke="#222" stroke-width="1.5"/>
    <rect x="2" y="2" width="136" height="14" rx="2" fill="#1a1a1a"/>
    <text x="70" y="13" text-anchor="middle" font-family="monospace" font-size="9" fill="#FFD700" font-weight="700">J35 · LIVE</text>
    <text x="20" y="35" text-anchor="middle" font-family="monospace" font-size="11" fill="#fff" font-weight="700">RMA</text>
    <text x="70" y="38" text-anchor="middle" font-family="monospace" font-size="16" fill="#ff3030" font-weight="900">2 - 1</text>
    <text x="120" y="35" text-anchor="middle" font-family="monospace" font-size="11" fill="#fff" font-weight="700">BAR</text>
  </g>

  <!-- Campo visible mejorado (líneas blancas más claras) -->
  <g opacity="0.85">
    <!-- Borde del campo -->
    <ellipse cx="400" cy="200" rx="100" ry="6" fill="none" stroke="#fff" stroke-width="0.6"/>
    <!-- Línea central -->
    <line x1="400" y1="195" x2="400" y2="206" stroke="#fff" stroke-width="0.6"/>
    <!-- Círculo central -->
    <ellipse cx="400" cy="200" rx="10" ry="2" fill="none" stroke="#fff" stroke-width="0.5"/>
    <!-- Áreas de portería -->
    <rect x="307" y="197" width="14" height="6" fill="none" stroke="#fff" stroke-width="0.4"/>
    <rect x="479" y="197" width="14" height="6" fill="none" stroke="#fff" stroke-width="0.4"/>
  </g>
</svg>
