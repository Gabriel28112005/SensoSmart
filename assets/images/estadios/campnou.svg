<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="skyC" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a3a5f"/>
      <stop offset="50%" stop-color="#3a5a8f"/>
      <stop offset="100%" stop-color="#a04050"/>
    </linearGradient>
    <linearGradient id="hormigonC" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d8d4c8"/>
      <stop offset="100%" stop-color="#a89c84"/>
    </linearGradient>
    <linearGradient id="fieldC" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a9555"/>
      <stop offset="100%" stop-color="#2d6a35"/>
    </linearGradient>
    <radialGradient id="lightC" cx="0.5" cy="0" r="1">
      <stop offset="0%" stop-color="#fff8c8" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#fff8c8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Cielo (atardecer Barcelona) -->
  <rect width="800" height="400" fill="url(#skyC)"/>

  <!-- Sol poniente -->
  <circle cx="650" cy="100" r="35" fill="#ffaa66" opacity="0.7"/>
  <circle cx="650" cy="100" r="50" fill="#ffaa66" opacity="0.3"/>

  <!-- Skyline Barcelona (Sagrada Familia silueta + Tibidabo al fondo) -->
  <g fill="#1a2540" opacity="0.6">
    <!-- Sagrada Familia (torres) -->
    <path d="M 100 180 L 105 100 L 110 180 Z"/>
    <path d="M 115 180 L 122 80 L 128 180 Z"/>
    <path d="M 132 180 L 138 90 L 144 180 Z"/>
    <!-- Edificios -->
    <rect x="200" y="180" width="60" height="100"/>
    <rect x="700" y="170" width="60" height="110"/>
    <rect x="760" y="200" width="40" height="80"/>
  </g>

  <!-- Sombra del estadio -->
  <ellipse cx="400" cy="375" rx="380" ry="20" fill="#000" opacity="0.4"/>

  <!-- Estructura del Camp Nou (forma redonda más amplia y baja) -->
  <!-- Base inferior (visible) -->
  <path d="M 60 365 L 60 290 Q 60 230 220 215 L 580 215 Q 740 230 740 290 L 740 365 Z"
        fill="url(#hormigonC)" stroke="#5a4a30" stroke-width="2"/>

  <!-- Cubierta superior nueva (Espai Barça) -->
  <path d="M 60 220 Q 200 195 400 190 Q 600 195 740 220 L 740 240 Q 600 215 400 210 Q 200 215 60 240 Z"
        fill="#3a5a8f" stroke="#1a2540" stroke-width="1.5"/>

  <!-- Logo FCB en la cubierta (siluetado) -->
  <g transform="translate(380,200)">
    <rect x="0" y="0" width="40" height="14" fill="#a04050" rx="2"/>
    <text x="20" y="10" text-anchor="middle" font-family="Arial Black" font-size="9" fill="#FFD700" font-weight="900">FCB</text>
  </g>

  <!-- Aros concéntricos del estadio (3 anillos) -->
  <g stroke="#8a7860" stroke-width="1" opacity="0.8" fill="none">
    <ellipse cx="400" cy="245" rx="335" ry="12"/>
    <ellipse cx="400" cy="285" rx="338" ry="14"/>
    <ellipse cx="400" cy="325" rx="338" ry="16"/>
  </g>

  <!-- Líneas verticales (estructura) -->
  <g stroke="#7a6850" stroke-width="1" opacity="0.6">
    <line x1="100" y1="230" x2="100" y2="365"/>
    <line x1="160" y1="222" x2="160" y2="365"/>
    <line x1="220" y1="218" x2="220" y2="365"/>
    <line x1="280" y1="216" x2="280" y2="365"/>
    <line x1="340" y1="215" x2="340" y2="365"/>
    <line x1="400" y1="215" x2="400" y2="365"/>
    <line x1="460" y1="215" x2="460" y2="365"/>
    <line x1="520" y1="215" x2="520" y2="365"/>
    <line x1="580" y1="216" x2="580" y2="365"/>
    <line x1="640" y1="220" x2="640" y2="365"/>
    <line x1="700" y1="225" x2="700" y2="365"/>
  </g>

  <!-- Foco de luz nocturna -->
  <ellipse cx="400" cy="200" rx="220" ry="60" fill="url(#lightC)"/>

  <!-- Campo visible -->
  <ellipse cx="400" cy="218" rx="100" ry="5" fill="url(#fieldC)" opacity="0.9"/>
  <line x1="400" y1="214" x2="400" y2="223" stroke="#fff" stroke-width="0.5" opacity="0.7"/>
  <ellipse cx="400" cy="218" rx="6" ry="1.5" fill="none" stroke="#fff" stroke-width="0.4" opacity="0.7"/>

  <!-- Luces alrededor (perimeter LED) -->
  <g fill="#fff5b8" opacity="0.85">
    <circle cx="100" cy="245" r="1.5"/>
    <circle cx="160" cy="232" r="1.5"/>
    <circle cx="220" cy="225" r="1.5"/>
    <circle cx="280" cy="222" r="1.5"/>
    <circle cx="340" cy="220" r="1.5"/>
    <circle cx="400" cy="219" r="1.5"/>
    <circle cx="460" cy="220" r="1.5"/>
    <circle cx="520" cy="222" r="1.5"/>
    <circle cx="580" cy="225" r="1.5"/>
    <circle cx="640" cy="232" r="1.5"/>
    <circle cx="700" cy="245" r="1.5"/>
  </g>

  <!-- Banderas catalanas (sutil) -->
  <g opacity="0.7">
    <line x1="160" y1="222" x2="160" y2="200" stroke="#a04050" stroke-width="1"/>
    <rect x="160" y="200" width="14" height="9" fill="#a04050"/>
    <rect x="160" y="200" width="14" height="9" fill="url(#stripesC)"/>

    <line x1="640" y1="220" x2="640" y2="200" stroke="#FFD700" stroke-width="1"/>
    <rect x="640" y="200" width="14" height="9" fill="#FFD700"/>
  </g>

  <!-- Logo Camp Nou texto -->
  <text x="400" y="345" text-anchor="middle" font-family="Arial Black, sans-serif"
        font-size="22" fill="#fff" font-weight="900" letter-spacing="2"
        opacity="0.35">CAMP NOU</text>

  <!-- Tira LED inferior -->
  <rect x="60" y="362" width="680" height="3" fill="#FFD700" opacity="0.7"/>

  <!-- Sello Smart Turf AI Elite -->
  <g transform="translate(660,30)">
    <circle r="22" fill="#1B4332" stroke="#FFD700" stroke-width="1.5"/>
    <text y="-2" text-anchor="middle" font-family="Arial" font-size="7" fill="#FFD700" font-weight="700">SMART</text>
    <text y="6" text-anchor="middle" font-family="Arial" font-size="7" fill="#FFD700" font-weight="700">TURF AI</text>
    <text y="14" text-anchor="middle" font-family="Arial" font-size="5" fill="#52B788">ELITE</text>
  </g>

  <!-- Mejoras: marcador electrónico + detalles de campo -->
  <!-- Marcador electrónico (panel LED) -->
  <g transform="translate(40,80)">
    <rect x="0" y="0" width="140" height="48" rx="4" fill="#0a0a0a" stroke="#222" stroke-width="1.5"/>
    <rect x="2" y="2" width="136" height="14" rx="2" fill="#1a1a1a"/>
    <text x="70" y="13" text-anchor="middle" font-family="monospace" font-size="9" fill="#FFD700" font-weight="700">J34 · LIVE</text>
    <text x="20" y="35" text-anchor="middle" font-family="monospace" font-size="11" fill="#fff" font-weight="700">BAR</text>
    <text x="70" y="38" text-anchor="middle" font-family="monospace" font-size="16" fill="#ff3030" font-weight="900">1 - 1</text>
    <text x="120" y="35" text-anchor="middle" font-family="monospace" font-size="11" fill="#fff" font-weight="700">RMA</text>
  </g>

  <!-- Campo visible mejorado (líneas blancas más claras) -->
  <g opacity="0.85">
    <!-- Borde del campo -->
    <ellipse cx="400" cy="200" rx="100" ry="6" fill="none" stroke="#fff" stroke-width="0.6"/>
    <!-- Línea central -->
    <line x1="400" y1="195" x2="400" y2="206" stroke="#fff" stroke-width="0.6"/>
    <!-- Círculo central -->
    <ellipse cx="400" cy="200" rx="10" ry="2" fill="none" stroke="#fff" stroke-width="0.5"/>
    <!-- Áreas de portería -->
    <rect x="307" y="197" width="14" height="6" fill="none" stroke="#fff" stroke-width="0.4"/>
    <rect x="479" y="197" width="14" height="6" fill="none" stroke="#fff" stroke-width="0.4"/>
  </g>
</svg>
