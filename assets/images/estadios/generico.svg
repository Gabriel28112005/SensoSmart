<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="skyD" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1B4332"/>
      <stop offset="100%" stop-color="#2D6A4F"/>
    </linearGradient>
    <linearGradient id="metalD" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d8e8d8"/>
      <stop offset="100%" stop-color="#88a888"/>
    </linearGradient>
    <radialGradient id="lightD" cx="0.5" cy="0" r="1">
      <stop offset="0%" stop-color="#fff8c8" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#fff8c8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="800" height="400" fill="url(#skyD)"/>

  <ellipse cx="400" cy="375" rx="350" ry="20" fill="#000" opacity="0.4"/>

  <!-- Estadio genérico -->
  <path d="M 100 365 L 100 290 Q 100 230 220 215 L 580 215 Q 700 230 700 290 L 700 365 Z"
        fill="url(#metalD)" stroke="#446644" stroke-width="2"/>

  <!-- Cubierta -->
  <ellipse cx="400" cy="210" rx="300" ry="15" fill="#2D6A4F" stroke="#1B4332" stroke-width="1.5"/>

  <!-- Líneas verticales -->
  <g stroke="#557766" stroke-width="1" opacity="0.6">
    <line x1="140" y1="225" x2="140" y2="365"/>
    <line x1="200" y1="220" x2="200" y2="365"/>
    <line x1="260" y1="218" x2="260" y2="365"/>
    <line x1="320" y1="216" x2="320" y2="365"/>
    <line x1="400" y1="215" x2="400" y2="365"/>
    <line x1="480" y1="216" x2="480" y2="365"/>
    <line x1="540" y1="218" x2="540" y2="365"/>
    <line x1="600" y1="220" x2="600" y2="365"/>
    <line x1="660" y1="225" x2="660" y2="365"/>
  </g>

  <!-- Foco de luz -->
  <ellipse cx="400" cy="200" rx="220" ry="60" fill="url(#lightD)"/>

  <!-- Campo -->
  <ellipse cx="400" cy="218" rx="100" ry="5" fill="#3a8045" opacity="0.9"/>
  <line x1="400" y1="214" x2="400" y2="223" stroke="#fff" stroke-width="0.5" opacity="0.7"/>

  <!-- Texto STADIUM -->
  <text x="400" y="335" text-anchor="middle" font-family="Arial Black, sans-serif"
        font-size="22" fill="#fff" font-weight="900" letter-spacing="3"
        opacity="0.3">STADIUM</text>

  <!-- Tira LED -->
  <rect x="100" y="362" width="600" height="3" fill="#FFD700" opacity="0.7"/>

  <!-- Sello -->
  <g transform="translate(660,30)">
    <circle r="22" fill="#1B4332" stroke="#52B788" stroke-width="1.5"/>
    <text y="-2" text-anchor="middle" font-family="Arial" font-size="7" fill="#52B788" font-weight="700">SMART</text>
    <text y="6" text-anchor="middle" font-family="Arial" font-size="7" fill="#52B788" font-weight="700">TURF AI</text>
  </g>
</svg>
